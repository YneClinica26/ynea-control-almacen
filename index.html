Title">Formulario</h2><button class="x" onclick="closeModal()">×</button></div><div id="modalBody"></div></div></div><script>
const KEY='ynea_almacen_v81'; const menus=[['inicio','⌂','Inicio'],['stock','▣','Stock'],['entradas','⇩','Entradas'],['salidas','⇨','Salidas'],['inventario','▦','Inventario'],['alertas','⚠','Alertas'],['productos','□','Productos'],['proveedores','▣','Proveedores'],['informes','▤','Informes'],['config','⚙','Configuración'],['usuarios','👥','Usuarios']];let state=JSON.parse(localStorage.getItem(KEY)||'null')||{current:null,patientsConnected:false,pacientes:[],usuarios:[{nombre:'Admin',apellidos:'YNEA',telefono:'',rol:'Administrador',estado:'Activo',clave:'1234'}],categorias:['Medicación','Dispositivo médico','Fungibles','Instrumental','Material sanitario'],unidades:['Unidad','Caja','Blíster','Bolsa','Frasco','Kit'],productos:[{codigo:'ALM-000001',nombre:'DIU Mirena',categoria:'Dispositivo médico',unidad:'Unidad',min:5,trazabilidad:true,estado:'Activo'},{codigo:'ALM-000002',nombre:'Guantes nitrilo',categoria:'Fungibles',unidad:'Caja',min:10,trazabilidad:false,estado:'Activo'},{codigo:'ALM-000003',nombre:'Ácido hialurónico 1 ml',categoria:'Medicación',unidad:'Unidad',min:3,trazabilidad:true,estado:'Activo'}],lotes:[{producto:'DIU Mirena',lote:'MIR2601',caducidad:'2028-12-31',stock:5,estado:'Activo'},{producto:'Guantes nitrilo',lote:'',caducidad:'',stock:20,estado:'Activo'},{producto:'Ácido hialurónico 1 ml',lote:'AH2602',caducidad:'2027-06-30',stock:2,estado:'Stock bajo'}],entradas:[],salidas:[],inventarios:[]};
function save(){localStorage.setItem(KEY,JSON.stringify(state))}function $(id){return document.getElementById(id)}function today(){return new Date().toISOString().slice(0,10)}function doLogin(){let u=$('loginUser').value.trim().toLowerCase(),p=$('loginPass').value;let found=state.usuarios.find(x=>(x.nombre||'').toLowerCase()===u&&x.clave===p&&x.estado==='Activo');if(!found){$('loginMsg').textContent='Usuario o clave incorrectos, o usuario bloqueado.';return}state.current=found;save();start()}function logout(){state.current=null;save();$('app').classList.add('hidden');$('login').classList.remove('hidden');$('loginPass').value='';$('loginMsg').textContent='Sesión cerrada. Vuelve a introducir la clave.'}function start(){if(!state.current){$('login').classList.remove('hidden');$('app').classList.add('hidden');return}$('login').classList.add('hidden');$('app').classList.remove('hidden');$('userName').textContent=state.current.nombre+' '+(state.current.apellidos||'');$('userRole').textContent='Rol: '+state.current.rol;renderNav();go('inicio')}function renderNav(){$('nav').innerHTML=menus.map(m=>`<button data-go="${m[0]}">${m[1]} ${m[2]}</button>`).join('');$('bottom').innerHTML=menus.slice(0,4).concat([['mas','…','Más']]).map(m=>`<button data-go="${m[0]}"><span>${m[1]}</span><span>${m[2]}</span></button>`).join('');document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go))}function active(v){document.querySelectorAll('[data-go]').forEach(b=>b.classList.toggle('active',b.dataset.go===v))}function go(v){if(v==='mas')v='config';active(v);render(v)}function lotStock(product){return state.lotes.filter(l=>l.producto===product).reduce((s,l)=>s+(+l.stock||0),0)}function isExpired(l){return l.caducidad&&l.caducidad<today()}function isNear(l){if(!l.caducidad)return false;let d=(new Date(l.caducidad)-new Date(today()))/86400000;return d>=0&&d<=90}function lowProducts(){return state.productos.filter(p=>lotStock(p.nombre)<(+p.min||0))}function expiredLots(){return state.lotes.filter(isExpired)}function nearLots(){return state.lotes.filter(isNear)}function render(v){const main=$('main');if(v==='inicio')return renderInicio(main);if(v==='stock')return renderStock(main);if(v==='entradas')return renderEntradas(main);if(v==='salidas')return renderSalidas(main);if(v==='inventario')return renderInventario(main);if(v==='alertas')return renderAlertas(main);if(v==='productos')return renderProductos(main);if(v==='proveedores')return renderProveedores(main);if(v==='informes')return renderInformes(main);if(v==='usuarios')return renderUsuarios(main);if(v==='config')return renderConfig(main)}function metric(i,n,t){return `<div class="card metric"><div class="ico">${i}</div><div><b>${n}</b><br>${t}</div></div>`}function empty(t){return `<div class="muted">${t}</div>`}function listLow(arr){return arr.length?arr.map(p=>`<div class="item"><div><b>${p.nombre}</b><br><small>${p.categoria} · mínimo ${p.min}</small></div><span class="pill warn">Stock ${lotStock(p.nombre)}</span></div>`).join(''):empty('No hay productos bajo mínimo')}function listLots(arr,cls){return arr.length?arr.map(l=>`<div class="item"><div><b>${l.producto}</b><br><small>Lote ${l.lote||'—'} · Cad. ${l.caducidad||'—'}</small></div><span class="pill ${cls}">Stock ${l.stock}</span></div>`).join(''):empty('Sin registros')}function renderInicio(main){let low=lowProducts(),exp=expiredLots(),near=nearLots(),bloq=state.lotes.filter(l=>l.estado==='Bloqueado');main.innerHTML=`<h1>Inicio</h1><p class="muted">Resumen general del almacén</p><div class="grid4">${metric('▣',low.length,'Stock bajo')} ${metric('📅',near.length,'Caducidades próximas')} ${metric('⚠',exp.length,'Caducados')} ${metric('🔔',bloq.length,'Bloqueados')}</div><div class="sectionGrid"><div class="card"><h2>Productos con stock bajo</h2><div class="list">${listLow(low)}</div></div><div class="card"><h2>Lotes caducados</h2><div class="list">${listLots(exp,'red')}</div></div><div class="card"><h2>Próximas caducidades</h2><div class="list">${listLots(near,'warn')}</div></div><div class="card"><h2>Accesos rápidos</h2><div class="toolbar"><button class="btn" onclick="openEntrada()">Nueva entrada</button><button class="btn" onclick="openSalida()">Nueva salida</button><button class="btn secondary" onclick="go('inventario')">Inventario</button></div></div></div>`}function cat(n){return(state.productos.find(p=>p.nombre===n)||{}).categoria||''}function badge(t){let c=t==='Activo'?'ok':t==='Stock bajo'?'warn':'red';return`<span class="pill ${c}">${t}</span>`}function table(h,rows){return`<div class="tableWrap"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${h.length}" class="muted">Sin datos</td></tr>`}</tbody></table></div>`}function renderStock(main){main.innerHTML=`<h1>Stock</h1><div class="toolbar"><button class="btn" onclick="openProducto()">Nuevo producto</button></div>${table(['Producto','Categoría','Lote','Caducidad','Stock','Estado'],state.lotes.map(l=>[l.producto,cat(l.producto),l.lote||'—',l.caducidad||'—',l.stock,badge(l.estado)]))}`}function renderEntradas(main){main.innerHTML=`<h1>Entradas</h1><div class="toolbar"><button class="btn" onclick="openEntrada()">Nueva entrada</button></div>${table(['Nº','Fecha','Proveedor','Factura','Usuario','Total'],state.entradas.map(e=>[e.num,e.fecha,e.proveedor,e.factura,e.usuario,e.total||'—']))}`}function renderSalidas(main){main.innerHTML=`<h1>Salidas</h1><div class="toolbar"><button class="btn" onclick="openSalida()">Nueva salida</button><button class="btn secondary" onclick="connectPatients()">Conectar pacientes</button></div>${table(['Nº','Fecha','Paciente','Profesional','Usuario','Estado'],state.salidas.map(s=>[s.num,s.fecha,s.paciente,s.profesional,s.usuario,badge(s.estado)]))}`}function renderInventario(main){main.innerHTML=`<h1>Inventario</h1><p class="muted">Conteo por producto + lote.</p>${table(['Producto','Lote','Caducidad','Stock sistema','Stock contado','Diferencia'],state.lotes.map(l=>[l.producto,l.lote||'—',l.caducidad||'—',l.stock,'','']))}`}function renderAlertas(main){main.innerHTML=`<h1>Alertas</h1><div class="sectionGrid"><div class="card"><h2>Stock bajo</h2>${listLow(lowProducts())}</div><div class="card"><h2>Caducados</h2>${listLots(expiredLots(),'red')}</div><div class="card"><h2>Próximos a caducar</h2>${listLots(nearLots(),'warn')}</div><div class="card"><h2>Bloqueados</h2>${listLots(state.lotes.filter(l=>l.estado==='Bloqueado'),'red')}</div></div>`}function renderProductos(main){main.innerHTML=`<h1>Productos</h1><div class="toolbar"><button class="btn" onclick="openProducto()">Nuevo producto</button><button class="btn secondary" onclick="openCategoria()">Nueva categoría</button><button class="btn secondary" onclick="openUnidad()">Nueva unidad</button></div>${table(['Código','Nombre','Categoría','Unidad','Mínimo','Trazabilidad','Estado'],state.productos.map(p=>[p.codigo,p.nombre,p.categoria,p.unidad,p.min,p.trazabilidad?'Sí':'No',badge(p.estado)]))}`}function renderProveedores(main){main.innerHTML=`<h1>Proveedores</h1><div class="toolbar"><button class="btn" onclick="openProveedor()">Nuevo proveedor</button></div><div class="card muted">Módulo preparado para proveedores múltiples e histórico de precios.</div>`}function renderInformes(main){main.innerHTML=`<h1>Informes</h1><div class="toolbar"><button class="btn" onclick="downloadCSV('stock')">Exportar stock CSV</button><button class="btn" onclick="downloadCSV('salidas')">Exportar salidas CSV</button><button class="btn secondary" onclick="window.print()">Imprimir / PDF</button></div><div class="sectionGrid"><div class="card"><h2>Stock bajo</h2>${listLow(lowProducts())}</div><div class="card"><h2>Caducidades</h2>${listLots(nearLots().concat(expiredLots()),'warn')}</div></div>`}function renderConfig(main){main.innerHTML=`<h1>Configuración</h1><div class="toolbar"><button class="btn" onclick="connectPatients()">Activar conexión pacientes</button><button class="btn secondary" onclick="go('usuarios')">Usuarios</button></div><div class="card"><b>Estado pacientes:</b> ${state.patientsConnected?'Conectados':'Sin conectar'}<br><span class="muted">La app consulta pacientes de Agenda YNEA. No los modifica.</span></div>`}function renderUsuarios(main){main.innerHTML=`<h1>Usuarios</h1><div class="toolbar"><button class="btn" onclick="openUsuario()">Nuevo usuario</button></div>${table(['Nombre','Apellidos','Teléfono','Rol','Estado','Acciones'],state.usuarios.map((u,i)=>[u.nombre,u.apellidos||'',u.telefono||'',u.rol,badge(u.estado),`<button class="btn small secondary" onclick="openUsuario(${i})">Editar</button>`]))}`}function openModal(t,b){$('modalTitle').textContent=t;$('modalBody').innerHTML=b;$('modal').classList.add('on')}function closeModal(){$('modal').classList.remove('on')}function openProducto(){openModal('Nuevo producto',`<div class="formGrid"><div class="field"><label>Nombre</label><input id="pNombre"></div><div class="field"><label>Categoría</label><select id="pCat">${state.categorias.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="field"><label>Unidad</label><select id="pUni">${state.unidades.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="field"><label>Stock mínimo</label><input id="pMin" type="number" value="1"></div><div class="field"><label>Trazabilidad clínica</label><select id="pTra"><option value="false">No</option><option value="true">Sí</option></select></div></div><button class="btn" onclick="saveProducto()">Guardar</button>`)}function saveProducto(){let n=$('pNombre').value.trim();if(!n)return;state.productos.push({codigo:'ALM-'+String(state.productos.length+1).padStart(6,'0'),nombre:n,categoria:$('pCat').value,unidad:$('pUni').value,min:+$('pMin').value||0,trazabilidad:$('pTra').value==='true',estado:'Activo'});state.lotes.push({producto:n,lote:'',caducidad:'',stock:0,estado:'Activo'});save();closeModal();go('productos')}function openCategoria(){openModal('Nueva categoría',`<div class="field"><label>Nombre categoría</label><input id="catNew"></div><button class="btn" onclick="state.categorias.push($('catNew').value);save();closeModal();go('productos')">Guardar</button>`)}function openUnidad(){openModal('Nueva unidad',`<div class="field"><label>Nombre unidad</label><input id="uniNew" placeholder="Ej. Frasco 200 ml"></div><button class="btn" onclick="state.unidades.push($('uniNew').value);save();closeModal();go('productos')">Guardar</button>`)}function openEntrada(){openModal('Nueva entrada',`<div class="formGrid"><div class="field"><label>Proveedor</label><input id="eProv"></div><div class="field"><label>Nº factura proveedor</label><input id="eFac"></div><div class="field"><label>Producto</label><select id="eProd">${state.productos.map(p=>`<option>${p.nombre}</option>`).join('')}</select></div><div class="field"><label>Cantidad</label><input id="eCant" type="number" value="1"></div><div class="field"><label>Lote</label><input id="eLote"></div><div class="field"><label>Caducidad</label><input id="eCad" type="date"></div></div><button class="btn" onclick="saveEntrada()">Guardar entrada TEST</button>`)}function saveEntrada(){let p=$('eProd').value,c=+$('eCant').value||0,l=$('eLote').value,ca=$('eCad').value;let row=state.lotes.find(x=>x.producto===p&&x.lote===l&&x.caducidad===ca);if(row)row.stock+=c;else state.lotes.push({producto:p,lote:l,caducidad:ca,stock:c,estado:'Activo'});state.entradas.push({num:'E-'+String(state.entradas.length+1).padStart(4,'0'),fecha:today(),proveedor:$('eProv').value,factura:$('eFac').value,usuario:state.current.nombre,total:'TEST'});save();closeModal();go('entradas')}function openSalida(){let opts=state.pacientes.map(p=>`<option value="${p.id}">${p.nombre} · ${p.telefono||''} · ${p.email||''}</option>`).join('');openModal('Nueva salida',`<div class="formGrid"><div class="field"><label>Paciente</label><select id="sPac">${opts||'<option>Conecta pacientes primero</option>'}</select></div><div class="field"><label>Profesional responsable</label><input id="sPro" value="Dra. Susana Royo"></div><div class="field"><label>Producto</label><select id="sProd">${state.productos.map(p=>`<option>${p.nombre}</option>`).join('')}</select></div><div class="field"><label>Cantidad</label><input id="sCant" type="number" value="1"></div></div><button class="btn" onclick="saveSalida()">Guardar salida TEST</button> <button class="btn secondary" onclick="openFichaPaciente()">Abrir ficha paciente</button>`)}function saveSalida(){let sel=$('sPac'),pac=state.pacientes.find(p=>String(p.id)===String(sel.value));state.salidas.push({num:'S-'+String(state.salidas.length+1).padStart(4,'0'),fecha:today(),paciente:pac?pac.nombre:sel.value,profesional:$('sPro').value,usuario:state.current.nombre,estado:'Registrado'});save();closeModal();go('salidas')}function openFichaPaciente(){let sel=$('sPac'),pac=state.pacientes.find(p=>String(p.id)===String(sel.value));if(!pac){alert('Selecciona un paciente conectado.');return}openModal('Ficha paciente',`<p><b>${pac.nombre}</b></p><p>Teléfono: ${pac.telefono||'—'}</p><p>Email: ${pac.email||'—'}</p><p>Observaciones: ${pac.observaciones||'—'}</p><button class="btn secondary" onclick="window.open('https://agenda-clinica-ynea.vercel.app','_blank')">Abrir Agenda YNEA</button>`)}function openUsuario(i){let u=i!=null?state.usuarios[i]:{nombre:'',apellidos:'',telefono:'',rol:'Solo lectura',estado:'Activo',clave:''};openModal(i!=null?'Editar usuario':'Nuevo usuario',`<div class="formGrid"><div class="field"><label>Nombre</label><input id="uNom" value="${u.nombre||''}"></div><div class="field"><label>Apellidos</label><input id="uApe" value="${u.apellidos||''}"></div><div class="field"><label>Teléfono</label><input id="uTel" value="${u.telefono||''}"></div><div class="field"><label>Rol</label><select id="uRol">${['Administrador','Almacén / Recepción','Profesional','Solo lectura'].map(r=>`<option ${u.rol===r?'selected':''}>${r}</option>`).join('')}</select></div><div class="field"><label>Estado</label><select id="uEst"><option ${u.estado==='Activo'?'selected':''}>Activo</option><option ${u.estado==='Bloqueado'?'selected':''}>Bloqueado</option><option ${u.estado==='Inactivo'?'selected':''}>Inactivo</option></select></div><div class="field"><label>Clave de acceso</label><input id="uClave" value="${u.clave||''}"></div></div><button class="btn" onclick="saveUsuario(${i==null?'null':i})">Guardar usuario</button>`)}function saveUsuario(i){let u={nombre:$('uNom').value,apellidos:$('uApe').value,telefono:$('uTel').value,rol:$('uRol').value,estado:$('uEst').value,clave:$('uClave').value};if(i==null)state.usuarios.push(u);else state.usuarios[i]=u;save();closeModal();go('usuarios')}function openProveedor(){openModal('Nuevo proveedor',`<div class="field"><label>Nombre proveedor</label><input></div><p class="muted">Módulo en preparación.</p>`)}async function connectPatients(){try{let r=await fetch('/api/pacientes',{cache:'no-store'});let j=await r.json();if(!r.ok)throw new Error(j.error||'Error');state.pacientes=j.pacientes||[];state.patientsConnected=true;save();$('dbState').textContent='Pacientes: conectados ('+state.pacientes.length+')';alert('Pacientes conectados: '+state.pacientes.length);go('config')}catch(e){alert('No se pudo conectar con pacientes: '+e.message)}}function downloadCSV(type){let rows=type==='salidas'?state.salidas:state.lotes;let csv=Object.keys(rows[0]||{sin_datos:''}).join(';')+'\n'+rows.map(o=>Object.values(o).join(';')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='ynea_'+type+'.csv';a.click()}if(state.patientsConnected){setTimeout(()=>{$('dbState').textContent='Pacientes: conectados ('+state.pacientes.length+')'},0)}start();
</script></body></html>
