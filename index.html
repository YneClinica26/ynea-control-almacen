<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#58C7E8"><title>YNEA Control de Almacén TEST v7.0</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="apple-touch-icon.png"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--blue:#58c7e8;--blue2:#0b8ed8;--dark:#123050;--muted:#6b7890;--line:#d8e8f4;--bg:#f7fbfe;--card:#fff;--danger:#e74c3c;--warn:#f5a623;--ok:#2eaa62}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--dark)}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:#fff;border-right:1px solid var(--line);padding:24px 16px;display:flex;flex-direction:column;gap:16px}.logo{width:190px;max-width:100%;margin:0 auto 10px;display:block}.subtitle{text-align:center;color:var(--blue2);font-weight:700;font-size:13px;margin-top:-10px}.nav{display:flex;flex-direction:column;gap:7px}.nav button,.cfg button,.quick button{border:1px solid transparent;background:transparent;padding:13px 14px;border-radius:12px;text-align:left;font-weight:700;color:var(--dark);cursor:pointer;font-size:15px}.nav button:hover,.nav button.active{background:#eaf7fd;color:var(--blue2);border-color:#c8edf9}.version{margin-top:auto;background:#eef8fd;border-radius:14px;padding:18px;text-align:center;color:var(--blue2);font-size:13px}.top{height:82px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px}.badge{background:var(--blue2);color:white;padding:8px 14px;border-radius:8px;font-weight:700;margin-right:12px}.user{display:flex;align-items:center;gap:14px}.avatar{width:46px;height:46px;border-radius:50%;background:#dff4fc;display:grid;place-items:center;color:var(--blue2);font-size:23px}.logout,.mini{border:1px solid var(--line);background:#fff;color:var(--dark);border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:700}.main{padding:24px 28px 70px}.title h1{margin:0 0 6px;font-size:28px}.title p{margin:0 0 20px;color:var(--muted)}.cards{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:16px;margin-bottom:18px}.card,.panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 6px 24px #0b8ed80a}.stat{display:flex;align-items:center;gap:18px}.ico{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:#e3f5fc;color:var(--blue2);font-size:26px}.stat strong{font-size:30px}.stat span{display:block;color:var(--muted);margin-top:4px}.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.quick button{background:#f6fbfe;border:1px solid #cdebf7;display:flex;gap:14px;align-items:center}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.empty{text-align:center;color:var(--muted);padding:34px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}.primary,.secondary,.dangerbtn{border:0;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer}.primary{background:var(--blue2);color:#fff}.secondary{background:#eef8fd;color:var(--blue2);border:1px solid #cceefa}.dangerbtn{background:#fdebea;color:#b91c1c}.table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.table th{background:#eef8fd}.pill{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}.ok{background:#eaf8ef;color:var(--ok)}.warn{background:#fff4dc;color:#a66a00}.danger{background:#fdebea;color:var(--danger)}.cfg{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px}.cfg button{background:#fff;border-color:var(--line);text-align:center}.modal{position:fixed;inset:0;background:#12305055;display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal.open{display:flex}.box{background:#fff;border-radius:18px;max-width:760px;width:100%;max-height:92vh;overflow:auto;padding:22px;box-shadow:0 30px 80px #0003}.box header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.x{border:0;background:#eef8fd;border-radius:9px;font-size:24px;width:40px;height:40px;cursor:pointer}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{display:flex;flex-direction:column;gap:6px;font-weight:700;font-size:13px}.form input,.form select,.form textarea{border:1px solid var(--line);border-radius:9px;padding:10px}.full{grid-column:1/-1}.bottom{display:none}.small{font-size:12px;color:var(--muted)}@media(max-width:850px){.app{display:block}.side{display:none}.top{height:auto;padding:12px 14px}.user .txt{display:none}.main{padding:16px 14px 86px}.cards,.quick,.grid2,.cfg{grid-template-columns:1fr}.form{grid-template-columns:1fr}.bottom{position:fixed;display:grid;grid-template-columns:repeat(5,1fr);bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:20}.bottom button{border:0;background:#fff;padding:10px 4px;color:var(--dark);font-weight:700}.bottom button.active{color:var(--blue2)}}
</style></head><body><div class="app"><aside class="side"><img src="logo-ynea-real-azul.png" class="logo" alt="YNEA"><div class="subtitle">CONTROL DE ALMACÉN</div><nav class="nav" id="nav"></nav><div class="version">Versión TEST v7.0.2<br>© 2026 YNEA</div></aside><section><header class="top"><div><span class="badge">TEST</span><span id="dbState">Pacientes: sin conectar</span></div><div class="user"><div class="avatar">●</div><div class="txt"><b id="userName">Administrador</b><br><small>Rol: Administrador</small></div><button class="logout" onclick="alert('Sesión cerrada en modo TEST')">Cerrar sesión</button></div></header><main class="main" id="main"></main></section></div><nav class="bottom" id="bottom"></nav><div class="modal" id="modal"><div class="box"><header><h2 id="modalTitle">Formulario</h2><button class="x" onclick="closeModal()">×</button></header><div id="modalBody"></div></div></div><script>
const KEY='ynea_almacen_v7';const defaultState={categorias:['Medicación','Dispositivo médico','Fungibles','Instrumental','Material sanitario'],unidades:['Unidad','Caja','Blíster','Bolsa','Frasco','Kit'],productos:[['ALM-000001','DIU Mirena','Dispositivo médico','Unidad','5','Sí','Activo'],['ALM-000002','Guantes nitrilo','Fungibles','Caja','10','No','Activo'],['ALM-000003','Ácido hialurónico 1 ml','Medicación','Unidad','3','Sí','Activo']],lotes:[['DIU Mirena','MIR2601','31/12/2028','5','Activo'],['Guantes nitrilo','—','—','20','Activo'],['Ácido hialurónico 1 ml','AH2602','30/06/2027','2','Stock bajo']],proveedores:[['Proveedor ejemplo','B00000000','—','Activo']],usuarios:[['Admin','YNEA','','Administrador','Activo']],entradas:[],salidas:[],pacientes:[],supabase:{url:'https://vadohvwjoxghubceffpn.supabase.co',key:'',tabla:'pacientes'},agendaUrl:'https://agenda-clinica-ynea.vercel.app'};let data=JSON.parse(localStorage.getItem(KEY)||JSON.stringify(defaultState));let current='Inicio';function save(){localStorage.setItem(KEY,JSON.stringify(data))}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}const views=['Inicio','Stock','Entradas','Salidas','Inventario','Alertas','Productos','Proveedores','Informes','Configuración','Usuarios'];function renderNav(){document.getElementById('nav').innerHTML=views.map(v=>`<button class="${v==current?'active':''}" onclick="go('${v}')">${v}</button>`).join('');document.getElementById('bottom').innerHTML=['Inicio','Stock','Entradas','Salidas','Configuración'].map(v=>`<button class="${v==current?'active':''}" onclick="go('${v}')">${v}</button>`).join('');document.getElementById('dbState').textContent=data.pacientes.length?'Pacientes: '+data.pacientes.length:'Pacientes: sin conectar'}function go(v){current=v;renderNav();render()}function badge(x){x=esc(x);if(x==='Activo')return '<span class="pill ok">Activo</span>'; if(x==='Stock bajo')return '<span class="pill warn">Stock bajo</span>'; if(['Bloqueado','Caducado','Inactivo','Anulado'].includes(x))return '<span class="pill danger">'+x+'</span>'; return x}function table(head,rows,actions){return `<table class="table"><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}${actions?'<th>Acciones</th>':''}</tr></thead><tbody>${rows.map((r,i)=>`<tr>${r.map(c=>`<td>${badge(c)}</td>`).join('')}${actions?`<td>${actions(i)}</td>`:''}</tr>`).join('')}</tbody></table>`}function render(){let h='';if(current==='Inicio')h=`<div class="title"><h1>Inicio</h1><p>Resumen general del almacén.</p></div><div class="cards"><div class="card stat"><div class="ico">□</div><div><strong>1</strong><span>Stock bajo</span></div></div><div class="card stat"><div class="ico" style="background:#fff3dc;color:#d58500">▣</div><div><strong>0</strong><span>Caducidades próximas</span></div></div><div class="card stat"><div class="ico" style="background:#fde7e7;color:#e74c3c">!</div><div><strong>0</strong><span>Caducados</span></div></div><div class="card stat"><div class="ico" style="background:#e8f8ee;color:#2eaa62">◉</div><div><strong>${data.pacientes.length}</strong><span>Pacientes cargados</span></div></div></div><div class="panel"><h2>Accesos rápidos</h2><div class="quick"><button onclick="openModal('entrada')"><span class="ico">+</span><span><b>Nueva entrada</b><br><small>Registrar entrada de productos</small></span></button><button onclick="openModal('salida')"><span class="ico">↪</span><span><b>Nueva salida</b><br><small>Registrar salida con paciente</small></span></button><button onclick="go('Inventario')"><span class="ico">▤</span><span><b>Inventario</b><br><small>Nuevo inventario</small></span></button></div></div><div class="grid2"><div class="panel"><h2>Entradas recientes</h2>${data.entradas.length?table(['Fecha','Proveedor','Factura'],data.entradas.slice(-5)):('<div class="empty">No hay entradas registradas</div>')}</div><div class="panel"><h2>Salidas recientes</h2>${data.salidas.length?table(['Fecha','Paciente','Profesional','Producto','Cantidad'],data.salidas.slice(-5)):('<div class="empty">No hay salidas registradas</div>')}</div></div>`;else if(current==='Stock')h=`<div class="title"><h1>Stock</h1><p>Stock por producto, lote y caducidad.</p></div>${table(['Producto','Lote','Caducidad','Stock','Estado'],data.lotes)}`;else if(current==='Productos')h=`<div class="title"><h1>Productos</h1><p>Administrador puede crear categorías y productos.</p></div><div class="toolbar"><button class="primary" onclick="openModal('producto')">+ Producto</button><button class="secondary" onclick="openModal('categoria')">+ Categoría</button></div>${table(['Código','Producto','Categoría','Unidad','Stock mín.','Trazabilidad','Estado'],data.productos)}`;else if(current==='Proveedores')h=`<div class="title"><h1>Proveedores</h1><p>Varios proveedores por producto e histórico de precios.</p></div><button class="primary" onclick="openModal('proveedor')">+ Proveedor</button><br><br>${table(['Proveedor','CIF/NIF','Teléfono','Estado'],data.proveedores)}`;else if(current==='Entradas')h=`<div class="title"><h1>Entradas</h1><p>Factura de proveedor obligatoria.</p></div><button class="primary" onclick="openModal('entrada')">+ Nueva entrada</button><br><br>${data.entradas.length?table(['Fecha','Proveedor','Factura'],data.entradas):'<div class="empty panel">Sin entradas todavía</div>'}`;else if(current==='Salidas')h=`<div class="title"><h1>Salidas</h1><p>Una salida por paciente. Pacientes leídos desde Supabase si está configurado.</p></div><button class="primary" onclick="openModal('salida')">+ Nueva salida</button><br><br>${data.salidas.length?table(['Fecha','Paciente','Profesional','Producto','Cantidad'],data.salidas):'<div class="empty panel">Sin salidas todavía</div>'}`;else if(current==='Inventario')h=`<div class="title"><h1>Inventario</h1><p>Conteo móvil por producto + lote.</p></div><div class="toolbar"><button class="primary">+ Nuevo inventario</button><button class="secondary">Modo conteo móvil</button></div><div class="empty panel">Inventarios pendientes</div>`;else if(current==='Alertas')h=`<div class="title"><h1>Alertas</h1><p>Stock bajo, caducidades, bloqueos y diferencias.</p></div><div class="panel"><span class="pill warn">Stock bajo</span> Ácido hialurónico 1 ml está por debajo del stock mínimo.</div>`;else if(current==='Informes')h=`<div class="title"><h1>Informes</h1><p>Stock, compras, consumo, trazabilidad y precios históricos.</p></div><div class="cards"><div class="card">Stock actual</div><div class="card">Entradas/compras</div><div class="card">Salidas/consumo</div><div class="card">Trazabilidad clínica</div></div>`;else if(current==='Configuración')h=`<div class="title"><h1>Configuración</h1><p>Accesos de administrador.</p></div><div class="cfg"><button onclick="openModal('categoria')">Categorías</button><button onclick="openModal('unidad')">Unidades</button><button onclick="go('Usuarios')">Usuarios</button><button onclick="openModal('supabase')">Conectar con Agenda YNEA</button></div><br><div class="panel"><b>Estado pacientes:</b> ${data.pacientes.length} pacientes cargados.<br><span class="small">La app no modifica pacientes. Solo los lee para registrar salidas.</span></div>`;else if(current==='Usuarios')h=`<div class="title"><h1>Usuarios</h1><p>Gestión editable de usuarios.</p></div><button class="primary" onclick="openModal('usuario')">+ Usuario</button><br><br>${table(['Nombre','Apellidos','Teléfono','Rol','Estado'],data.usuarios,i=>`<button class="mini" onclick="openModal('usuario',${i})">Editar</button>`)}`;document.getElementById('main').innerHTML=h}function closeModal(){document.getElementById('modal').classList.remove('open')}function openModal(type,idx){document.getElementById('modalTitle').textContent={producto:'Producto',categoria:'Categoría',unidad:'Unidad',proveedor:'Proveedor',entrada:'Nueva entrada',salida:'Nueva salida',usuario:idx>=0?'Editar usuario':'Nuevo usuario',supabase:'Conectar con Agenda YNEA'}[type]||'Formulario';let body='';if(type==='usuario'){let u=idx>=0?data.usuarios[idx]:['','','','Almacén / Recepción','Activo'];body=`<div class="form"><label>Nombre<input id="uNom" value="${esc(u[0])}"></label><label>Apellidos<input id="uApe" value="${esc(u[1])}"></label><label>Teléfono<input id="uTel" value="${esc(u[2])}"></label><label>Rol<select id="uRol">${['Administrador','Almacén / Recepción','Profesional','Solo lectura'].map(r=>`<option ${u[3]===r?'selected':''}>${r}</option>`).join('')}</select></label><label>Estado<select id="uEst">${['Activo','Bloqueado','Inactivo'].map(r=>`<option ${u[4]===r?'selected':''}>${r}</option>`).join('')}</select></label><div class="full toolbar"><button class="primary" onclick="saveUsuario(${idx>=0?idx:-1})">Guardar usuario</button><button class="secondary" onclick="closeModal()">Cancelar</button></div></div>`}else if(type==='supabase'){body=`<div class="panel"><h3>Agenda Clínica YNEA</h3><p>Conecta con la base de pacientes de Agenda Clínica YNEA para buscar pacientes en las salidas.</p><p class="small">No modifica pacientes. Solo los consulta.</p><div class="toolbar"><button class="primary" onclick="autoConnectPatients()">Conectar con Agenda YNEA</button><button class="secondary" onclick="closeModal()">Cerrar</button></div><div id="sbMsg" class="small"></div></div>`}else if(type==='producto'){body=`<div class="form"><label>Nombre<input id="pNom"></label><label>Categoría<select id="pCat">${data.categorias.map(x=>`<option>${x}</option>`).join('')}</select></label><label>Unidad<select id="pUni">${data.unidades.map(x=>`<option>${x}</option>`).join('')}</select></label><label>Stock mínimo<input id="pMin" type="number" value="1"></label><label>Trazabilidad clínica<select id="pTra"><option>No</option><option>Sí</option></select></label><label>Estado<select id="pEst"><option>Activo</option><option>Bloqueado</option><option>Inactivo</option></select></label><button class="primary full" onclick="saveProducto()">Guardar producto</button></div>`}else if(type==='categoria'){body=`<div class="form"><label class="full">Nombre categoría<input id="catNom"></label><button class="primary full" onclick="let v=document.getElementById('catNom').value.trim();if(v){data.categorias.push(v);save();closeModal();render()}else alert('Indica categoría')">Guardar categoría</button></div>`}else if(type==='unidad'){body=`<div class="form"><label class="full">Nombre unidad<input id="uniNom" placeholder="Ej. Frasco 200 ml"></label><button class="primary full" onclick="let v=document.getElementById('uniNom').value.trim();if(v){data.unidades.push(v);save();closeModal();render()}else alert('Indica unidad')">Guardar unidad</button></div>`}else if(type==='proveedor'){body=`<div class="form"><label>Nombre<input id="prNom"></label><label>CIF/NIF<input id="prCif"></label><label>Teléfono<input id="prTel"></label><label>Estado<select id="prEst"><option>Activo</option><option>Bloqueado</option><option>Inactivo</option></select></label><button class="primary full" onclick="saveProveedor()">Guardar proveedor</button></div>`}else if(type==='entrada'){body=`<div class="form"><label>Fecha recepción<input id="eFecha" type="date"></label><label>Proveedor<input id="eProv"></label><label>Nº factura proveedor<input id="eFac"></label><label>Factura proveedor obligatoria<input type="file" accept=".pdf,.jpg,.jpeg,.png"></label><button class="primary full" onclick="saveEntrada()">Guardar entrada TEST</button></div>`}else if(type==='salida'){const pacientes=data.pacientes.map(p=>`<option value="${esc(p.id)}">${esc(p.nombreCompleto)}${p.telefono?' · '+esc(p.telefono):''}${p.email?' · '+esc(p.email):''}</option>`).join('');body=`<div class="form"><label class="full">Paciente ${data.pacientes.length?'<select id="sPac">'+pacientes+'</select>':'<input id="sPac" placeholder="Sin conexión: escribe paciente">'}</label>${data.pacientes.length?'<div class="full toolbar"><button class="secondary" type="button" onclick="openPacienteFicha()">Abrir ficha paciente</button><button class="secondary" type="button" onclick="openPacienteAgenda()">Abrir en Agenda YNEA</button></div>':''}<label>Profesional responsable<input id="sPro"></label><label>Producto<select id="sProd">${data.productos.map(p=>`<option>${esc(p[1])}</option>`).join('')}</select></label><label>Cantidad<input id="sCant" type="number" value="1"></label><button class="primary full" onclick="saveSalida()">Guardar salida</button></div>`}document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.add('open')}function saveUsuario(idx){let u=[uNom.value.trim(),uApe.value.trim(),uTel.value.trim(),uRol.value,uEst.value];if(!u[0]||!u[1])return alert('Nombre y apellidos son obligatorios');if(idx>=0)data.usuarios[idx]=u;else data.usuarios.push(u);save();closeModal();render()}function saveProducto(){let n=pNom.value.trim();if(!n)return alert('Indica nombre');data.productos.push(['ALM-'+String(data.productos.length+1).padStart(6,'0'),n,pCat.value,pUni.value,pMin.value,pTra.value,pEst.value]);save();closeModal();render()}function saveProveedor(){if(!prNom.value.trim())return alert('Indica proveedor');data.proveedores.push([prNom.value.trim(),prCif.value.trim(),prTel.value.trim(),prEst.value]);save();closeModal();render()}function saveEntrada(){if(!eProv.value.trim()||!eFac.value.trim())return alert('Proveedor y Nº factura son obligatorios');data.entradas.push([eFecha.value||new Date().toISOString().slice(0,10),eProv.value.trim(),eFac.value.trim()]);save();closeModal();render()}function getPacienteSeleccionado(){if(!data.pacientes.length)return null;const val=document.getElementById('sPac')?.value;return data.pacientes.find(p=>String(p.id)===String(val))||data.pacientes.find(p=>p.nombreCompleto===val)||null}
function openPacienteFicha(){const p=getPacienteSeleccionado();if(!p)return alert('Selecciona un paciente');document.getElementById('modalTitle').textContent='Ficha paciente YNEA';document.getElementById('modalBody').innerHTML=`<div class="panel"><h3>${esc(p.nombreCompleto)}</h3><p><b>Teléfono:</b> ${esc(p.telefono||'—')}</p><p><b>Email:</b> ${esc(p.email||'—')}</p><p><b>ID YNEA:</b> ${esc(p.id||'—')}</p><p class="small">Ficha leída desde la tabla pacientes de Agenda YNEA. Desde Control de Almacén solo se consulta; no se modifica.</p></div><div class="toolbar"><button class="primary" onclick="openPacienteAgenda()">Abrir en Agenda YNEA</button><button class="secondary" onclick="closeModal()">Cerrar</button></div>`;document.getElementById('modal').classList.add('open')}
function openPacienteAgenda(){const p=getPacienteSeleccionado();if(!p)return alert('Selecciona un paciente');const base=(data.agendaUrl||'https://agenda-clinica-ynea.vercel.app').replace(/\/$/,'');const url=base+'/?paciente_id='+encodeURIComponent(p.id||'')+'&paciente='+encodeURIComponent(p.nombreCompleto||'');window.open(url,'_blank')}
function saveSalida(){if(!sPac.value||!sPro.value.trim())return alert('Paciente y profesional son obligatorios');let pac=sPac.value;if(data.pacientes.length){const p=getPacienteSeleccionado();pac=p?p.nombreCompleto:sPac.value}data.salidas.push([new Date().toISOString().slice(0,10),pac,sPro.value.trim(),sProd.value,sCant.value]);save();closeModal();render()}function saveSupabase(){data.supabase={url:'https://vadohvwjoxghubceffpn.supabase.co',key:(data.supabase&&data.supabase.key)||'',tabla:'pacientes'};data.agendaUrl='https://agenda-clinica-ynea.vercel.app';save();renderNav()}
async function autoConnectPatients(){data.supabase.url='https://vadohvwjoxghubceffpn.supabase.co';data.supabase.tabla='pacientes';data.agendaUrl='https://agenda-clinica-ynea.vercel.app';save();await loadPatients()}
async function loadPatients(){const msg=document.getElementById('sbMsg');try{saveSupabase();if(!data.supabase.key){throw new Error('Conexión pendiente: falta incorporar la clave pública de Agenda YNEA en el archivo. No se muestra en pantalla por seguridad.');}const client=supabase.createClient(data.supabase.url,data.supabase.key);const {data:rows,error}=await client.from('pacientes').select('id,nombre,telefono,email,observaciones').limit(1000);if(error)throw error;data.pacientes=(rows||[]).map(r=>({id:r.id||'',nombre:r.nombre||'',apellidos:'',telefono:r.telefono||'',email:r.email||'',nombreCompleto:(r.nombre||'Paciente sin nombre')})).sort((a,b)=>a.nombreCompleto.localeCompare(b.nombreCompleto));save();if(msg)msg.textContent='Pacientes cargados: '+data.pacientes.length;renderNav();render()}catch(e){if(msg)msg.textContent='Error: '+(e.message||e);else alert('Error: '+(e.message||e))}}renderNav();render();
</script></body></html>
