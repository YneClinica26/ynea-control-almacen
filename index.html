<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#58C7E8">
  <title>YNEA Control de Almacén TEST</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root{--blue:#58c7e8;--blue2:#0b8ed8;--dark:#123050;--muted:#6b7890;--line:#d8e8f4;--bg:#f7fbfe;--card:#fff;--danger:#e74c3c;--warn:#f5a623;--ok:#2eaa62}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--dark)}
    .app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:#fff;border-right:1px solid var(--line);padding:24px 16px;display:flex;flex-direction:column;gap:16px}.logo{width:190px;max-width:100%;margin:0 auto 10px;display:block}.subtitle{text-align:center;color:var(--blue2);font-weight:700;font-size:13px;margin-top:-10px}.nav{display:flex;flex-direction:column;gap:7px}.nav button,.cfg button,.quick button{border:1px solid transparent;background:transparent;padding:13px 14px;border-radius:12px;text-align:left;font-weight:700;color:var(--dark);cursor:pointer;font-size:15px}.nav button:hover,.nav button.active{background:#eaf7fd;color:var(--blue2);border-color:#c8edf9}.version{margin-top:auto;background:#eef8fd;border-radius:14px;padding:18px;text-align:center;color:var(--blue2);font-size:13px}.top{height:82px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px}.badge{background:var(--blue2);color:white;padding:8px 14px;border-radius:8px;font-weight:700;margin-right:12px}.user{display:flex;align-items:center;gap:14px}.avatar{width:46px;height:46px;border-radius:50%;background:#dff4fc;display:grid;place-items:center;color:var(--blue2);font-size:23px}.logout{border:1px solid var(--line);background:#fff;color:var(--dark);border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:700}.main{padding:24px 28px 70px}.view{display:none}.view.active{display:block}.title h1{margin:0 0 6px;font-size:28px}.title p{margin:0 0 20px;color:var(--muted)}.cards{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:16px;margin-bottom:18px}.card,.panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 6px 24px #0b8ed80a}.stat{display:flex;align-items:center;gap:18px}.ico{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:#e3f5fc;color:var(--blue2);font-size:26px}.stat strong{font-size:30px}.stat span{display:block;color:var(--muted);margin-top:4px}.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.quick button{background:#f6fbfe;border:1px solid #cdebf7;display:flex;gap:14px;align-items:center}.quick b{display:block;font-size:17px}.quick small{color:var(--muted)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.empty{text-align:center;color:var(--muted);padding:34px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}.primary,.secondary{border:0;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer}.primary{background:var(--blue2);color:#fff}.secondary{background:#eef8fd;color:var(--blue2);border:1px solid #cceefa}.table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left}.table th{background:#eef8fd}.pill{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}.ok{background:#eaf8ef;color:var(--ok)}.warn{background:#fff4dc;color:#a66a00}.danger{background:#fdebea;color:var(--danger)}.cfg{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px}.cfg button{background:#fff;border-color:var(--line);text-align:center}.modal{position:fixed;inset:0;background:#12305055;display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal.open{display:flex}.box{background:#fff;border-radius:18px;max-width:620px;width:100%;padding:22px;box-shadow:0 30px 80px #0003}.box header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.box h2{margin:0}.x{border:0;background:#eef8fd;border-radius:9px;font-size:24px;width:40px;height:40px;cursor:pointer}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{display:flex;flex-direction:column;gap:6px;font-weight:700;font-size:13px}.form input,.form select{border:1px solid var(--line);border-radius:9px;padding:10px}.full{grid-column:1/-1}.bottom{display:none}
    @media(max-width:850px){.app{display:block}.side{display:none}.top{height:auto;padding:12px 14px}.top .env{font-size:12px}.user .txt{display:none}.main{padding:16px 14px 86px}.logo-mobile{display:block}.cards{grid-template-columns:1fr}.quick{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.cfg{grid-template-columns:1fr}.form{grid-template-columns:1fr}.bottom{position:fixed;display:grid;grid-template-columns:repeat(5,1fr);bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:20}.bottom button{border:0;background:#fff;padding:10px 4px;color:var(--dark);font-weight:700}.bottom button.active{color:var(--blue2)}.cards .card{padding:16px}.stat strong{font-size:24px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <img src="logo-ynea-real-azul.png" class="logo" alt="YNEA"><div class="subtitle">CONTROL DE ALMACÉN</div>
    <nav class="nav" id="nav"></nav>
    <div class="version">Versión TEST v4.0<br>© 2026 YNEA</div>
  </aside>
  <section>
    <header class="top"><div class="env"><span class="badge">TEST</span> Entorno de pruebas</div><div class="user"><div class="avatar">●</div><div class="txt"><b>Administrador</b><br><small>Rol: Administrador</small></div><button class="logout" onclick="alert('Sesión cerrada en modo TEST')">Cerrar sesión</button></div></header>
    <main class="main" id="main"></main>
  </section>
</div>
<nav class="bottom" id="bottom"></nav>
<div class="modal" id="modal"><div class="box"><header><h2 id="modalTitle">Formulario</h2><button class="x" onclick="closeModal()">×</button></header><div id="modalBody"></div></div></div>
<script>
const data={categorias:['Medicación','Dispositivo médico','Fungibles','Instrumental','Material sanitario'],unidades:['Unidad','Caja','Blíster','Bolsa','Frasco','Kit'],productos:[['ALM-000001','DIU Mirena','Dispositivo médico','Unidad','5','Sí','Activo'],['ALM-000002','Guantes nitrilo','Fungibles','Caja','10','No','Activo'],['ALM-000003','Ácido hialurónico 1 ml','Medicación','Unidad','3','Sí','Activo']],lotes:[['DIU Mirena','MIR2601','31/12/2028','5','Activo'],['Guantes nitrilo','—','—','20','Activo'],['Ácido hialurónico 1 ml','AH2602','30/06/2027','2','Stock bajo']],proveedores:[['Proveedor ejemplo','B00000000','—','Activo']],usuarios:[['Admin','YNEA','','Administrador','Activo']]};
const views=['Inicio','Stock','Entradas','Salidas','Inventario','Alertas','Productos','Proveedores','Informes','Configuración','Usuarios'];let current='Inicio';
function id(v){return v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function renderNav(){const html=views.map(v=>`<button class="${v==current?'active':''}" onclick="go('${v}')">${v}</button>`).join('');document.getElementById('nav').innerHTML=html;document.getElementById('bottom').innerHTML=['Inicio','Stock','Entradas','Salidas','Configuración'].map(v=>`<button class="${v==current?'active':''}" onclick="go('${v}')">${v}</button>`).join('')}
function go(v){current=v;renderNav();render()}
function table(head,rows){return `<table class="table"><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${badge(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function badge(x){if(x==='Activo')return '<span class="pill ok">Activo</span>'; if(x==='Stock bajo')return '<span class="pill warn">Stock bajo</span>'; if(x==='Bloqueado'||x==='Caducado')return '<span class="pill danger">'+x+'</span>'; return x}
function render(){let h=''; if(current==='Inicio')h=`<div class="title"><h1>Inicio</h1><p>Resumen general del almacén.</p></div><div class="cards"><div class="card stat"><div class="ico">□</div><div><strong>1</strong><span>Stock bajo</span></div></div><div class="card stat"><div class="ico" style="background:#fff3dc;color:#d58500">▣</div><div><strong>0</strong><span>Caducidades próximas</span></div></div><div class="card stat"><div class="ico" style="background:#fde7e7;color:#e74c3c">!</div><div><strong>0</strong><span>Caducados</span></div></div><div class="card stat"><div class="ico" style="background:#e8f8ee;color:#2eaa62">◉</div><div><strong>0</strong><span>Alertas activas</span></div></div></div><div class="panel"><h2>Accesos rápidos</h2><div class="quick"><button onclick="openModal('entrada')"><span class="ico">+</span><span><b>Nueva entrada</b><small>Registrar entrada de productos</small></span></button><button onclick="openModal('salida')"><span class="ico">↪</span><span><b>Nueva salida</b><small>Registrar salida con paciente</small></span></button><button onclick="go('Inventario')"><span class="ico">▤</span><span><b>Inventario</b><small>Nuevo inventario</small></span></button></div></div><div class="grid2"><div class="panel"><h2>Entradas recientes</h2><div class="empty">No hay entradas registradas</div></div><div class="panel"><h2>Salidas recientes</h2><div class="empty">No hay salidas registradas</div></div></div><div class="panel" style="margin-top:18px"><h2>Inventarios abiertos</h2><div class="empty">No hay inventarios abiertos</div></div>`;
else if(current==='Stock')h=`<div class="title"><h1>Stock</h1><p>Stock por producto, lote y caducidad.</p></div>${table(['Producto','Lote','Caducidad','Stock','Estado'],data.lotes)}`;
else if(current==='Productos')h=`<div class="title"><h1>Productos</h1><p>Administrador puede crear categorías y productos.</p></div><div class="toolbar"><button class="primary" onclick="openModal('producto')">+ Producto</button><button class="secondary" onclick="openModal('categoria')">+ Categoría</button></div>${table(['Código','Producto','Categoría','Unidad','Stock mín.','Trazabilidad','Estado'],data.productos)}`;
else if(current==='Proveedores')h=`<div class="title"><h1>Proveedores</h1><p>Varios proveedores por producto e histórico de precios.</p></div><button class="primary" onclick="openModal('proveedor')">+ Proveedor</button><br><br>${table(['Proveedor','CIF/NIF','Teléfono','Estado'],data.proveedores)}`;
else if(current==='Entradas')h=`<div class="title"><h1>Entradas</h1><p>Factura de proveedor obligatoria. Una entrada puede contener varios productos.</p></div><button class="primary" onclick="openModal('entrada')">+ Nueva entrada</button><div class="empty panel">Sin entradas todavía</div>`;
else if(current==='Salidas')h=`<div class="title"><h1>Salidas</h1><p>Una salida por paciente.</p></div><button class="primary" onclick="openModal('salida')">+ Nueva salida</button><div class="empty panel">Sin salidas todavía</div>`;
else if(current==='Inventario')h=`<div class="title"><h1>Inventario</h1><p>Conteo móvil por producto + lote.</p></div><div class="toolbar"><button class="primary">+ Nuevo inventario</button><button class="secondary">Modo conteo móvil</button></div><div class="empty panel">Inventarios pendientes</div>`;
else if(current==='Alertas')h=`<div class="title"><h1>Alertas</h1><p>Stock bajo, caducidades, bloqueos y diferencias.</p></div><div class="panel"><span class="pill warn">Stock bajo</span> Ácido hialurónico 1 ml está por debajo del stock mínimo.</div>`;
else if(current==='Informes')h=`<div class="title"><h1>Informes</h1><p>Stock, compras, consumo, trazabilidad y precios históricos.</p></div><div class="cards"><div class="card">Stock actual</div><div class="card">Entradas/compras</div><div class="card">Salidas/consumo</div><div class="card">Trazabilidad clínica</div></div>`;
else if(current==='Configuración')h=`<div class="title"><h1>Configuración</h1><p>Sin botón de copias. Accesos de administrador.</p></div><div class="cfg"><button onclick="openModal('categoria')">Categorías</button><button onclick="openModal('unidad')">Unidades</button><button onclick="go('Usuarios')">Usuarios</button></div>`;
else if(current==='Usuarios')h=`<div class="title"><h1>Usuarios</h1><p>Gestión básica de usuarios.</p></div><button class="primary" onclick="openModal('usuario')">+ Usuario</button><br><br>${table(['Nombre','Apellidos','Teléfono','Rol','Estado'],data.usuarios)}`;
document.getElementById('main').innerHTML=h}
function openModal(type){const titles={producto:'Nuevo producto',categoria:'Nueva categoría',unidad:'Nueva unidad',proveedor:'Nuevo proveedor',entrada:'Nueva entrada',salida:'Nueva salida',usuario:'Nuevo usuario'};document.getElementById('modalTitle').textContent=titles[type]||'Formulario';let body=''; if(type==='producto')body=`<div class="form"><label>Nombre<input></label><label>Categoría<select>${data.categorias.map(x=>`<option>${x}</option>`).join('')}</select></label><label>Unidad<select>${data.unidades.map(x=>`<option>${x}</option>`).join('')}</select></label><label>Stock mínimo<input type="number" value="1"></label><label>Trazabilidad clínica<select><option>No</option><option>Sí</option></select></label><label>Estado<select><option>Activo</option><option>Bloqueado</option><option>Inactivo</option></select></label><button class="primary full" onclick="closeModal();return false">Guardar producto TEST</button></div>`; else if(type==='entrada')body=`<div class="form"><label>Fecha recepción<input type="date"></label><label>Proveedor<input></label><label>Nº factura proveedor<input></label><label>Factura proveedor obligatoria<input type="file" accept=".pdf,.jpg,.jpeg,.png"></label><button class="primary full" onclick="closeModal();return false">Guardar entrada TEST</button></div>`; else if(type==='salida')body=`<div class="form"><label>Paciente<input></label><label>Profesional responsable<input></label><label>Producto<input></label><label>Cantidad<input type="number" value="1"></label><button class="primary full" onclick="closeModal();return false">Guardar salida TEST</button></div>`; else body=`<div class="form"><label>Nombre<input placeholder="${type==='unidad'?'Ej. Frasco 200 ml':''}"></label><button class="primary full" onclick="closeModal();return false">Guardar TEST</button></div>`;document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')} renderNav(); render();
</script>
</body>
</html>
